name: Continuous deployment

on:
  workflow_run:
    workflows:
      - Continuous integration
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out tested revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Collect production static files
        env:
          DJANGO_SETTINGS_MODULE: home_sweet_home.settings.production
          DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build
          SECRET_KEY: build-only-not-a-production-secret
          ALLOWED_HOSTS: .run.app
          CSRF_TRUSTED_ORIGINS: https://example.com
        run: python manage.py collectstatic --noinput

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Apply database migrations
        env:
          DJANGO_SETTINGS_MODULE: home_sweet_home.settings.production
          SECRET_KEY: migration-only-not-a-production-secret
          ALLOWED_HOSTS: .run.app
          CSRF_TRUSTED_ORIGINS: https://example.com
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest --secret=home-sweet-home-database-url-unpooled)"
          echo "::add-mask::$DATABASE_URL"
          export DATABASE_URL
          python manage.py migrate --noinput

      - name: Deploy Cloud Run function
        id: deploy
        uses: google-github-actions/deploy-cloud-functions@v4
        timeout-minutes: 15
        with:
          name: ${{ vars.GCP_FUNCTION_NAME }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          environment: GEN_2
          runtime: python313
          entry_point: home_sweet_home
          source_dir: .
          service_account: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
          build_service_account: projects/${{ vars.GCP_PROJECT_ID }}/serviceAccounts/${{ vars.GCP_BUILD_SERVICE_ACCOUNT }}
          memory: 512Mi
          min_instance_count: 0
          max_instance_count: 2
          max_instance_request_concurrency: 1
          service_timeout: 60s
          environment_variables: |-
            DJANGO_SETTINGS_MODULE=home_sweet_home.settings.production
            ALLOWED_HOSTS=.run.app,${{ vars.GCP_REGION }}-${{ vars.GCP_PROJECT_ID }}.cloudfunctions.net
            CSRF_TRUSTED_ORIGINS=https://${{ vars.GCP_REGION }}-${{ vars.GCP_PROJECT_ID }}.cloudfunctions.net
            SECURE_SSL_REDIRECT=True
            TIME_ZONE=Europe/Amsterdam
          secrets: |-
            DATABASE_URL=projects/${{ vars.GCP_PROJECT_ID }}/secrets/home-sweet-home-database-url/versions/latest
            SECRET_KEY=projects/${{ vars.GCP_PROJECT_ID }}/secrets/home-sweet-home-django-secret-key/versions/latest

      - name: Add deployment URL to the job summary
        env:
          GCP_FUNCTION_NAME: ${{ vars.GCP_FUNCTION_NAME }}
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: |
          APP_URL="$(gcloud functions describe "$GCP_FUNCTION_NAME" --v2 --region "$GCP_REGION" --format='value(serviceConfig.uri)')"
          echo "### Deployment completed" >> "$GITHUB_STEP_SUMMARY"
          echo "$APP_URL" >> "$GITHUB_STEP_SUMMARY"
