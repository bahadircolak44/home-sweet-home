name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: home_sweet_home_test
          POSTGRES_USER: home_sweet_home
          POSTGRES_PASSWORD: home_sweet_home
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U home_sweet_home -d home_sweet_home_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: home_sweet_home.settings.local
      DATABASE_URL: postgresql://home_sweet_home:home_sweet_home@127.0.0.1:5432/home_sweet_home_test
      SECRET_KEY: ci-only-not-a-production-secret
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test

      - name: Verify production static build
        env:
          DJANGO_SETTINGS_MODULE: home_sweet_home.settings.production
          DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build
          SECRET_KEY: build-only-not-a-production-secret
          ALLOWED_HOSTS: .run.app
          CSRF_TRUSTED_ORIGINS: https://example.com
        run: python manage.py collectstatic --noinput
